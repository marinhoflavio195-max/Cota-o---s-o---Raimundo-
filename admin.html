<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - ADMIN
</header>

<div class="container">

<div id="login">
  <h2>Login Administrador</h2>
  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Criar Nova Cotação</h2>
<input type="text" id="nomeCotacao" placeholder="Nome da cotação">
<button onclick="criarCotacao()">Criar</button>

<h2>Cotações</h2>
<div id="lista"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔥 CONFIGURAÇÃO NOVA DO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

// Inicializa Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// LOGIN SIMPLES
window.entrar = function(){
  const senha = document.getElementById("senha").value;
  if(senha === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
  } else {
    alert("Senha incorreta!");
  }
}


// CRIAR COTAÇÃO
window.criarCotacao = async function(){
  const nome = document.getElementById("nomeCotacao").value;
  if(!nome) return alert("Digite o nome");

  try {

    await addDoc(collection(db,"cotacoes"),{
      nome: nome,
      status: "aberta",
      dataCriacao: new Date()
    });

    alert("Cotação criada com sucesso!");
    document.getElementById("nomeCotacao").value = "";

  } catch (e) {
    alert("Erro ao salvar: " + e.message);
  }
}


// LISTAR COTAÇÕES EM TEMPO REAL
const lista = document.getElementById("lista");

onSnapshot(collection(db,"cotacoes"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();

    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br><br>
        <button onclick="abrir('${docSnap.id}','${data.nome}')">Gerenciar Produtos</button>
        <button onclick="excluir('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});


// EXCLUIR
window.excluir = async function(id){
  await deleteDoc(doc(db,"cotacoes",id));
}


// ABRIR PRODUTOS
window.abrir = function(id,nome){
  localStorage.setItem("cotacaoId",id);
  localStorage.setItem("cotacaoNome",nome);
  window.location.href="produtos.html";
}

</script>

</body>
</html>
