<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}
.container{ padding:20px; }
input,button,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}
button:hover{ background:#cc0000; }
.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
.btn-secundario{
  background:#444;
}
.btn-secundario:hover{
  background:#222;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - ADMIN
</header>

<div class="container">

<div id="login">
  <h2>Login Administrador</h2>
  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Criar Nova Cotação</h2>
<input type="text" id="nomeCotacao" placeholder="Nome da cotação"><br>

<label>Início:</label>
<input type="datetime-local" id="inicioCotacao"><br>

<label>Fim:</label>
<input type="datetime-local" id="fimCotacao"><br>

<button onclick="criarCotacao()">Criar Cotação</button>

<hr>

<h2>Lista de Cotações</h2>
<div id="lista"></div>

<hr>

<h2>Exportar Relatório Final</h2>
<select id="cotacaoExport"></select><br>
<button onclick="exportarRelatorio()">Exportar Relatório Final</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.entrar = function(){
  if(document.getElementById("senha").value === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
  } else {
    alert("Senha incorreta!");
  }
}

window.criarCotacao = async function(){
  const nome = nomeCotacao.value;
  const inicio = inicioCotacao.value;
  const fim = fimCotacao.value;

  if(!nome || !inicio || !fim) return alert("Preencha todos os campos");

  await addDoc(collection(db,"cotacoes"),{
    nome,
    status:"aberta",
    ativa:true,
    inicio:new Date(inicio),
    fim:new Date(fim),
    dataCriacao:new Date()
  });

  alert("Cotação criada!");
  nomeCotacao.value="";
  inicioCotacao.value="";
  fimCotacao.value="";
}

const lista = document.getElementById("lista");
const selectExport = document.getElementById("cotacaoExport");

onSnapshot(collection(db,"cotacoes"), snapshot=>{
  lista.innerHTML="";
  selectExport.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const inicio = data.inicio?.seconds ? new Date(data.inicio.seconds*1000).toLocaleString() : "-";
    const fim = data.fim?.seconds ? new Date(data.fim.seconds*1000).toLocaleString() : "-";

    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        <b>ID da Cotação:</b> ${docSnap.id}<br>
        Início: ${inicio}<br>
        Fim: ${fim}<br><br>

        <button onclick="abrir('${docSnap.id}','${data.nome}')">
          Gerenciar Produtos
        </button>

        <button class="btn-secundario" onclick="copiarId('${docSnap.id}')">
          Copiar ID da Cotação
        </button>

        <br><br>

        <button onclick="excluir('${docSnap.id}')">Excluir</button>
      </div>
    `;

    selectExport.innerHTML+=`<option value="${docSnap.id}">${data.nome}</option>`;
  });
});

window.excluir = async id=>{
  await deleteDoc(doc(db,"cotacoes",id));
}

window.abrir = (id,nome)=>{
  localStorage.setItem("cotacaoId",id);
  localStorage.setItem("cotacaoNome",nome);
  window.location.href="produtos.html";
}

window.copiarId = function(id){
  navigator.clipboard.writeText(id);
  alert("ID da cotação copiado com sucesso!");
}

window.exportarRelatorio = async function(){

  const cotacaoId = selectExport.value;
  const cotacaoSnap = await getDocs(collection(db,"cotacoes"));
  let cotacaoData;

  cotacaoSnap.forEach(d=>{
    if(d.id===cotacaoId){
      cotacaoData=d.data();
    }
  });

  const agora = new Date();
  const fim = new Date(cotacaoData.fim.seconds*1000);

  if(agora < fim){
    alert("⏳ Cotação ainda está ativa.");
    return;
  }

  const produtosSnap = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));

  let relatorio=[];

  for(const produtoDoc of produtosSnap.docs){

    const produto = produtoDoc.data();
    const precosSnap = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos",produtoDoc.id,"precos"));

    let menorPreco=null;
    let vencedor="";

    precosSnap.forEach(p=>{
      const valor=parseFloat(p.data().preco);
      if(menorPreco===null || valor<menorPreco){
        menorPreco=valor;
        vencedor=p.data().fornecedor;
      }
    });

    relatorio.push({
      Produto: produto.nome,
      Quantidade: produto.quantidade,
      Unidade: produto.unidade,
      "Menor Preço": menorPreco ?? "Sem lance",
      "Fornecedor Vencedor": vencedor || "-"
    });
  }

  const ws = XLSX.utils.json_to_sheet(relatorio);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Relatório Final");
  XLSX.writeFile(wb, "Relatorio_Final_Cotacao.xlsx");
}

</script>
</body>
</html>
