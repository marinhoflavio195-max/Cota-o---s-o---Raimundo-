<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#8B0000;color:white;text-align:center;}
header{background:#B22222;padding:20px;}
header img{width:180px;margin-bottom:10px;}
.container{padding:20px;}
input,button,select{padding:10px;margin:5px;border-radius:8px;border:none;}
button{background:#ff0000;color:white;cursor:pointer;}
button:hover{background:#cc0000;}
.card{background:white;color:black;padding:15px;margin:10px auto;border-radius:10px;max-width:600px;}
.status{font-weight:bold;}
hr{margin:30px 0;border:1px solid #fff;}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h2>PAINEL ADMINISTRATIVO</h2>
</header>

<div class="container">

<div id="login">
<h2>Login Administrador</h2>
<input type="password" id="senha" placeholder="Digite a senha"><br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Criar Nova Cotação</h2>
<input type="text" id="nomeCotacao" placeholder="Nome da cotação"><br>
<label>Início:</label>
<input type="datetime-local" id="inicioCotacao"><br>
<label>Fim:</label>
<input type="datetime-local" id="fimCotacao"><br>
<button onclick="criarCotacao()">Criar Cotação</button>

<hr>

<h2>Lista de Cotações</h2>
<div id="lista"></div>

<hr>

<h2>Importar Produtos via Excel</h2>
<select id="cotacaoImport"></select><br>
<input type="file" id="arquivoExcel" accept=".xlsx,.xls"><br>
<button onclick="importarExcel()">Importar Produtos</button>

<hr>

<h2>Produtos da Cotação</h2>
<select id="cotacaoProdutos" onchange="carregarProdutos()"></select><br>
<input type="text" id="filtroProduto" placeholder="Filtrar produto..." onkeyup="filtrarProdutos()"><br>
<div id="totalProdutos"></div>
<div id="listaProdutos"></div>

<hr>

<h2>Exportar Relatório</h2>
<select id="cotacaoExport"></select><br>
<button onclick="exportarExcel()">Exportar Excel</button>
<button onclick="exportarPDF()">Gerar PDF Profissional</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"SUA_API_KEY",
authDomain:"cotacao-sao-raimundo-oficial.firebaseapp.com",
projectId:"cotacao-sao-raimundo-oficial"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.entrar=function(){
if(senha.value==="1234"){
login.style.display="none";
painel.style.display="block";
}else alert("Senha incorreta!");
}

window.criarCotacao=async function(){
if(!nomeCotacao.value||!inicioCotacao.value||!fimCotacao.value)
return alert("Preencha todos os campos");

await addDoc(collection(db,"cotacoes"),{
nome:nomeCotacao.value,
inicio:new Date(inicioCotacao.value),
fim:new Date(fimCotacao.value),
status:"ativa",
dataCriacao:new Date()
});

alert("Cotação criada!");
nomeCotacao.value="";
inicioCotacao.value="";
fimCotacao.value="";
}

const lista=document.getElementById("lista");
const selectImport=document.getElementById("cotacaoImport");
const selectExport=document.getElementById("cotacaoExport");
const selectProdutos=document.getElementById("cotacaoProdutos");

onSnapshot(collection(db,"cotacoes"),snap=>{
lista.innerHTML="";
selectImport.innerHTML="";
selectExport.innerHTML="";
selectProdutos.innerHTML="";

snap.forEach(docSnap=>{
const data=docSnap.data();

lista.innerHTML+=`
<div class="card">
<b>${data.nome}</b><br>
Status: <span class="status">${data.status}</span><br><br>
<button onclick="ativar('${docSnap.id}')">Ativar</button>
<button onclick="desativar('${docSnap.id}')">Desativar</button>
<button onclick="encerrar('${docSnap.id}')">Encerrar</button>
<button onclick="excluir('${docSnap.id}')">Excluir</button>
<br><br>
<button onclick="copiarLink('${docSnap.id}')">🔗 Copiar Link</button>
</div>`;

selectImport.innerHTML+=`<option value="${docSnap.id}">${data.nome}</option>`;
selectExport.innerHTML+=`<option value="${docSnap.id}">${data.nome}</option>`;
selectProdutos.innerHTML+=`<option value="${docSnap.id}">${data.nome}</option>`;
});
});

window.ativar=id=>updateDoc(doc(db,"cotacoes",id),{status:"ativa"});
window.desativar=id=>updateDoc(doc(db,"cotacoes",id),{status:"desativada"});
window.encerrar=id=>updateDoc(doc(db,"cotacoes",id),{status:"encerrada"});
window.excluir=id=>deleteDoc(doc(db,"cotacoes",id));

window.copiarLink=function(id){
const base=window.location.href.replace("admin.html","");
const link=base+"fornecedor.html?id="+id;
navigator.clipboard.writeText(link);
alert("Link copiado:\n"+link);
}

/* IMPORTAR EXCEL */
window.importarExcel=async function(){
if(!selectImport.value)return alert("Selecione cotação");
const file=document.getElementById("arquivoExcel").files[0];
if(!file)return alert("Selecione arquivo");

const reader=new FileReader();
reader.onload=async function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

for(const item of json){
await addDoc(collection(db,"cotacoes",selectImport.value,"produtos"),{
nome:item.nome||item.Nome,
quantidade:item.quantidade||item.Quantidade||"",
unidade:item.unidade||item.Unidade||""
});
}
alert("Produtos importados!");
carregarProdutos();
};
reader.readAsArrayBuffer(file);
}

/* CARREGAR PRODUTOS */
window.carregarProdutos=async function(){
listaProdutos.innerHTML="";
if(!selectProdutos.value)return;

const snap=await getDocs(collection(db,"cotacoes",selectProdutos.value,"produtos"));
totalProdutos.innerHTML="Total: "+snap.size+" produtos";

snap.forEach(docSnap=>{
const p=docSnap.data();
listaProdutos.innerHTML+=`
<div class="card produto">
<b>${p.nome}</b><br>
Qtd: ${p.quantidade} ${p.unidade}<br><br>
<button onclick="editarProduto('${docSnap.id}')">Editar</button>
<button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
</div>`;
});
}

window.filtrarProdutos=function(){
const filtro=filtroProduto.value.toLowerCase();
document.querySelectorAll(".produto").forEach(p=>{
p.style.display=p.innerText.toLowerCase().includes(filtro)?"block":"none";
});
}

window.excluirProduto=async function(id){
await deleteDoc(doc(db,"cotacoes",selectProdutos.value,"produtos",id));
carregarProdutos();
}

window.editarProduto=async function(id){
const novoNome=prompt("Novo nome:");
if(!novoNome)return;
await updateDoc(doc(db,"cotacoes",selectProdutos.value,"produtos",id),{nome:novoNome});
carregarProdutos();
}

/* EXPORTAR PDF PROFISSIONAL */
window.exportarPDF=async function(){
const {jsPDF}=window.jspdf;
if(!selectExport.value)return alert("Selecione cotação");

const cotacaoId=selectExport.value;
const produtosSnap=await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));

const pdf=new jsPDF("p","mm","a4");
let y=20;
let totalEconomizado=0;
let totalFornecedor={};

pdf.setFontSize(16);
pdf.text("RELATÓRIO FINAL DE COTAÇÃO",105,y,{align:"center"});
y+=8;
pdf.setFontSize(10);
pdf.text("Data/Hora: "+new Date().toLocaleString(),14,y);
y+=6;
pdf.text("Cotação: "+cotacaoId,14,y);
y+=10;

for(const produtoDoc of produtosSnap.docs){
const produto=produtoDoc.data();
const precosSnap=await getDocs(collection(db,"cotacoes",cotacaoId,"produtos",produtoDoc.id,"precos"));

let ranking=[];
precosSnap.forEach(p=>{
ranking.push({
fornecedor:p.data().fornecedor,
telefone:p.data().telefone||"",
valor:parseFloat(p.data().preco)
});
});

pdf.text("Produto: "+produto.nome,14,y); y+=6;

if(ranking.length===0){
pdf.text("SEM PREÇO",18,y); y+=8;
continue;
}

ranking.sort((a,b)=>a.valor-b.valor);

const menor=ranking[0];
const segundo=ranking[1];
const maior=ranking[ranking.length-1];

totalEconomizado+=maior.valor-menor.valor;
totalFornecedor[menor.fornecedor]=(totalFornecedor[menor.fornecedor]||0)+menor.valor;

pdf.text("1º: "+menor.fornecedor+" | "+menor.telefone+" | R$ "+menor.valor.toFixed(2),18,y); y+=6;
if(segundo){
pdf.text("2º: "+segundo.fornecedor+" | "+segundo.telefone+" | R$ "+segundo.valor.toFixed(2),18,y); y+=6;
}

y+=4;
if(y>270){pdf.addPage();y=20;}
}

pdf.addPage(); y=20;
pdf.text("TOTAL POR FORNECEDOR",14,y); y+=8;
for(const f in totalFornecedor){
pdf.text(f+" - R$ "+totalFornecedor[f].toFixed(2),14,y);
y+=6;
}
y+=6;
pdf.text("TOTAL ECONOMIZADO: R$ "+totalEconomizado.toFixed(2),14,y);

pdf.save("Relatorio_Cotacao.pdf");
}

</script>
</body>
</html>
