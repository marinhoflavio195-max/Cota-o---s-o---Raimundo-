<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:450px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - ADMIN
</header>

<div class="container">

<div id="login">
  <h2>Login Administrador</h2>
  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Criar Nova Cotação</h2>
<input type="text" id="nomeCotacao" placeholder="Nome da cotação"><br>

<label>Início da Cotação:</label><br>
<input type="datetime-local" id="inicioCotacao"><br>

<label>Término da Cotação:</label><br>
<input type="datetime-local" id="fimCotacao"><br>

<button onclick="criarCotacao()">Criar Cotação</button>

<h2>Lista de Cotações</h2>
<div id="lista"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.entrar = function(){
  const senha = document.getElementById("senha").value;
  if(senha === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
  } else {
    alert("Senha incorreta!");
  }
}

window.criarCotacao = async function(){
  const nome = document.getElementById("nomeCotacao").value;
  const inicio = document.getElementById("inicioCotacao").value;
  const fim = document.getElementById("fimCotacao").value;

  if(!nome) return alert("Digite o nome da cotação");
  if(!inicio || !fim) return alert("Defina início e término");

  try {
    await addDoc(collection(db,"cotacoes"),{
      nome: nome,
      status: "ativa", // 🔴 CORRIGIDO AQUI
      dataCriacao: new Date(),
      inicio: new Date(inicio),
      fim: new Date(fim)
    });

    alert("Cotação criada com sucesso!");

    document.getElementById("nomeCotacao").value="";
    document.getElementById("inicioCotacao").value="";
    document.getElementById("fimCotacao").value="";

  } catch (e) {
    alert("Erro ao salvar: " + e.message);
  }
}

const lista = document.getElementById("lista");

onSnapshot(collection(db,"cotacoes"), (snapshot)=>{
  lista.innerHTML="";

  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();

    let inicioStr = "-";
    let fimStr = "-";

    if(data.inicio?.toDate){
      inicioStr = data.inicio.toDate().toLocaleString();
    }

    if(data.fim?.toDate){
      fimStr = data.fim.toDate().toLocaleString();
    }

    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        Status: ${data.status}<br>
        Início: ${inicioStr}<br>
        Fim: ${fimStr}<br><br>
        <button onclick="abrirProdutos('${docSnap.id}','${data.nome}')">Gerenciar Produtos</button>
        <button onclick="excluirCotacao('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.abrirProdutos = function(id,nome){
  localStorage.setItem("cotacaoId",id);
  localStorage.setItem("cotacaoNome",nome);
  window.location.href="produtos.html";
}

window.excluirCotacao = async function(id){
  await deleteDoc(doc(db,"cotacoes",id));
}
</script>

</body>
</html>
