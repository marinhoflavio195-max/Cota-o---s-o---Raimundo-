<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
}
header img{
  width:180px;
  margin-bottom:10px;
}
.container{ padding:20px; }
input,button,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}
button:hover{ background:#cc0000; }
.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
.status{
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h2>PAINEL ADMINISTRATIVO</h2>
</header>

<div class="container">

<div id="login">
  <h2>Login Administrador</h2>
  <input type="password" id="senha" placeholder="Digite a senha">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Exportar Relatório Final (PDF)</h2>
<select id="cotacaoExport"></select><br>
<button onclick="exportarRelatorio()">Gerar PDF</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const { jsPDF } = window.jspdf;

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.entrar = function(){
  if(document.getElementById("senha").value === "1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("painel").style.display="block";
    carregarCotacoes();
  } else {
    alert("Senha incorreta!");
  }
}

const selectExport = document.getElementById("cotacaoExport");

async function carregarCotacoes(){
  const cotacoesSnap = await getDocs(collection(db,"cotacoes"));
  selectExport.innerHTML="";
  cotacoesSnap.forEach(docSnap=>{
    const data = docSnap.data();
    selectExport.innerHTML += `<option value="${docSnap.id}">${data.nome}</option>`;
  });
}

/* ================= EXPORTAR PDF ================= */

window.exportarRelatorio = async function(){

  const cotacaoId = selectExport.value;
  if(!cotacaoId) return alert("Selecione a cotação");

  const cotacaoDoc = await getDoc(doc(db,"cotacoes",cotacaoId));
  const cotacaoData = cotacaoDoc.data();

  const produtosSnap = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));

  const pdf = new jsPDF("p","mm","a4");
  let y = 20;

  pdf.setFontSize(16);
  pdf.text("SÃO RAIMUNDO SUPERMERCADO", 105, y, {align:"center"}); y+=8;
  pdf.setFontSize(10);
  pdf.text("Relatório Oficial de Cotação",105,y,{align:"center"}); y+=8;
  pdf.text("Data: "+new Date().toLocaleString(),14,y); y+=6;
  pdf.text("Número da Cotação: "+cotacaoId,14,y); y+=10;

  let totalFornecedor = {};
  let totalEconomizado = 0;

  for(const produtoDoc of produtosSnap.docs){

    const produto = produtoDoc.data();
    const precosSnap = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos",produtoDoc.id,"precos"));

    let ranking = [];
    precosSnap.forEach(p=>{
      ranking.push({
        fornecedor:p.data().fornecedor,
        telefone:p.data().telefone || "",
        valor:parseFloat(p.data().preco)
      });
    });

    if(ranking.length === 0){
      pdf.text(produto.nome + " - SEM PREÇO",14,y); y+=6;
      continue;
    }

    ranking.sort((a,b)=>a.valor-b.valor);
    const menor = ranking[0].valor;
    const maior = ranking[ranking.length-1].valor;
    totalEconomizado += (maior - menor);

    pdf.text("Produto: "+produto.nome,14,y); y+=6;

    ranking.slice(0,3).forEach((r,i)=>{
      pdf.text(
        (i+1)+"º Lugar: "+r.fornecedor+
        " | Tel: "+r.telefone+
        " | R$ "+r.valor.toFixed(2),
        18,y
      ); y+=6;

      if(i===0){
        totalFornecedor[r.fornecedor] = (totalFornecedor[r.fornecedor] || 0) + r.valor;
      }
    });

    y+=4;
    if(y>270){ pdf.addPage(); y=20; }
  }

  pdf.addPage(); y=20;
  pdf.setFontSize(12);
  pdf.text("TOTAL POR FORNECEDOR",14,y); y+=8;

  for(const fornecedor in totalFornecedor){
    pdf.text(fornecedor+" - R$ "+totalFornecedor[fornecedor].toFixed(2),14,y); y+=6;
  }

  y+=6;
  pdf.text("TOTAL GERAL ECONOMIZADO: R$ "+totalEconomizado.toFixed(2),14,y);

  pdf.save("Relatorio_Cotacao_"+cotacaoId+".pdf");
}
</script>
</body>
</html>
