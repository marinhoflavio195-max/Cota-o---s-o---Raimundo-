<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - São Raimundo Supermercado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#8B0000;color:white;text-align:center;}
header{background:#B22222;padding:20px;}
header img{width:180px;margin-bottom:10px;}
.container{padding:20px;}
input,button,select{padding:10px;margin:5px;border-radius:8px;border:none;}
button{background:#ff0000;color:white;cursor:pointer;}
button:hover{background:#cc0000;}
.card{background:white;color:black;padding:15px;margin:10px auto;border-radius:10px;max-width:600px;}
.status{font-weight:bold;}
.produtoBox{background:#fff;color:#000;margin:5px;padding:8px;border-radius:6px;}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h2>PAINEL ADMINISTRATIVO</h2>
</header>

<div class="container">

<div id="login">
<h2>Login</h2>
<input type="password" id="senha" placeholder="Senha"><br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="painel" style="display:none;">

<h2>Criar Cotação</h2>
<input type="text" id="nomeCotacao" placeholder="Nome"><br>
<input type="datetime-local" id="inicioCotacao"><br>
<input type="datetime-local" id="fimCotacao"><br>
<button onclick="criarCotacao()">Criar</button>

<hr>

<h2>Cotações</h2>
<div id="lista"></div>

<hr>

<h2>Importar Produtos</h2>
<select id="cotacaoImport"></select><br>
<input type="file" id="arquivoExcel"><br>
<button onclick="importarExcel()">Importar</button>
<button onclick="removerDuplicados()">Remover Duplicados</button>

<hr>

<h2>Produtos da Cotação</h2>
<select id="cotacaoProdutos"></select><br>
<input type="text" id="filtroProduto" placeholder="Filtrar produto">
<button onclick="carregarProdutos()">Buscar</button>
<div id="listaProdutos"></div>

<hr>

<h2>Exportar</h2>
<select id="cotacaoExport"></select><br>
<button onclick="exportarExcel()">Excel</button>
<button onclick="exportarPDF()">PDF Profissional</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,collection,addDoc,deleteDoc,doc,
onSnapshot,getDocs,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"SUA_API_KEY",
authDomain:"cotacao-sao-raimundo-oficial.firebaseapp.com",
projectId:"cotacao-sao-raimundo-oficial",
storageBucket:"cotacao-sao-raimundo-oficial.appspot.com",
messagingSenderId:"999255626219",
appId:"1:999255626219:web:653adf6dedde30237fc9ae"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.entrar=function(){
if(senha.value==="1234"){
login.style.display="none";
painel.style.display="block";
}else alert("Senha incorreta");
}

window.criarCotacao=async function(){
if(!nomeCotacao.value||!inicioCotacao.value||!fimCotacao.value)
return alert("Preencha tudo");

await addDoc(collection(db,"cotacoes"),{
nome:nomeCotacao.value,
inicio:new Date(inicioCotacao.value),
fim:new Date(fimCotacao.value),
status:"ativa",
dataCriacao:new Date()
});
alert("Criado!");
nomeCotacao.value="";
}

const lista=document.getElementById("lista");
const selects=["cotacaoImport","cotacaoExport","cotacaoProdutos"];

onSnapshot(collection(db,"cotacoes"),snap=>{
lista.innerHTML="";
selects.forEach(id=>document.getElementById(id).innerHTML="");

snap.forEach(docSnap=>{
const data=docSnap.data();

lista.innerHTML+=`
<div class="card">
<b>${data.nome}</b><br>
Status: ${data.status}<br>
<button onclick="copiarLink('${docSnap.id}')">Copiar Link</button>
<button onclick="ativar('${docSnap.id}')">Ativar</button>
<button onclick="desativar('${docSnap.id}')">Desativar</button>
<button onclick="encerrar('${docSnap.id}')">Encerrar</button>
<button onclick="excluir('${docSnap.id}')">Excluir</button>
<div id="count-${docSnap.id}"></div>
</div>`;

selects.forEach(id=>{
document.getElementById(id).innerHTML+=`<option value="${docSnap.id}">${data.nome}</option>`;
});

contarProdutos(docSnap.id);
});
});

async function contarProdutos(id){
const snap=await getDocs(collection(db,"cotacoes",id,"produtos"));
document.getElementById("count-"+id).innerHTML=
"Produtos: "+snap.size;
}

window.copiarLink=function(id){
const url=new URL(window.location.href);
const base=url.origin+url.pathname.replace("admin.html","");
const link=base+"fornecedor.html?id="+id;
navigator.clipboard.writeText(link);
alert("Link copiado:\n"+link);
}

window.ativar=id=>updateDoc(doc(db,"cotacoes",id),{status:"ativa"});
window.desativar=id=>updateDoc(doc(db,"cotacoes",id),{status:"desativada"});
window.encerrar=id=>updateDoc(doc(db,"cotacoes",id),{status:"encerrada"});
window.excluir=id=>deleteDoc(doc(db,"cotacoes",id));

/* IMPORTAR */
window.importarExcel=async function(){
const id=cotacaoImport.value;
if(!id)return alert("Selecione cotação");
const file=arquivoExcel.files[0];
if(!file)return alert("Selecione arquivo");

const reader=new FileReader();
reader.onload=async e=>{
const data=new Uint8Array(e.target.result);
const wb=XLSX.read(data,{type:"array"});
const ws=wb.Sheets[wb.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(ws);

let existentes=[];
const snap=await getDocs(collection(db,"cotacoes",id,"produtos"));
snap.forEach(p=>existentes.push(p.data().nome.toLowerCase()));

for(const item of json){
const nome=(item.nome||item.Nome||"").trim();
if(!nome)continue;
if(existentes.includes(nome.toLowerCase()))continue;

await addDoc(collection(db,"cotacoes",id,"produtos"),{
nome:nome,
quantidade:item.quantidade||item.Quantidade||"",
unidade:item.unidade||item.Unidade||""
});
}
alert("Importado com sucesso");
};
reader.readAsArrayBuffer(file);
}

/* REMOVER DUPLICADOS */
window.removerDuplicados=async function(){
const id=cotacaoImport.value;
const snap=await getDocs(collection(db,"cotacoes",id,"produtos"));
let nomes={};
for(const p of snap.docs){
const nome=p.data().nome.toLowerCase();
if(nomes[nome]){
await deleteDoc(doc(db,"cotacoes",id,"produtos",p.id));
}else nomes[nome]=true;
}
alert("Duplicados removidos");
}

/* LISTAR PRODUTOS */
window.carregarProdutos=async function(){
const id=cotacaoProdutos.value;
const filtro=filtroProduto.value.toLowerCase();
const div=document.getElementById("listaProdutos");
div.innerHTML="";

const snap=await getDocs(collection(db,"cotacoes",id,"produtos"));
snap.forEach(p=>{
const data=p.data();
if(filtro && !data.nome.toLowerCase().includes(filtro))return;

div.innerHTML+=`
<div class="produtoBox">
${data.nome} | ${data.quantidade} ${data.unidade}
<button onclick="editarProduto('${id}','${p.id}')">Editar</button>
<button onclick="excluirProduto('${id}','${p.id}')">Excluir</button>
</div>`;
});
}

window.excluirProduto=async function(cid,pid){
await deleteDoc(doc(db,"cotacoes",cid,"produtos",pid));
carregarProdutos();
}

window.editarProduto=async function(cid,pid){
const novo=prompt("Novo nome:");
if(!novo)return;
await updateDoc(doc(db,"cotacoes",cid,"produtos",pid),{nome:novo});
carregarProdutos();
}

/* EXPORTAR EXCEL */
window.exportarExcel=async function(){
const id=cotacaoExport.value;
const snap=await getDocs(collection(db,"cotacoes",id,"produtos"));
let dados=[];
snap.forEach(p=>dados.push(p.data()));
const ws=XLSX.utils.json_to_sheet(dados);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Relatorio");
XLSX.writeFile(wb,"Relatorio.xlsx");
}

/* PDF COMPLETO */
window.exportarPDF=async function(){
const {jsPDF}=window.jspdf;
const id=cotacaoExport.value;
const produtosSnap=await getDocs(collection(db,"cotacoes",id,"produtos"));
const pdf=new jsPDF();
let y=10;

pdf.text("RELATÓRIO FINAL",10,y);
y+=10;

for(const produtoDoc of produtosSnap.docs){
const produto=produtoDoc.data();
const precosSnap=await getDocs(collection(db,"cotacoes",id,"produtos",produtoDoc.id,"precos"));
let ranking=[];
precosSnap.forEach(p=>{
ranking.push({
fornecedor:p.data().fornecedor,
telefone:p.data().telefone||"",
valor:parseFloat(p.data().preco)
});
});
ranking.sort((a,b)=>a.valor-b.valor);

pdf.text("Produto: "+produto.nome,10,y);
y+=6;

if(ranking[0])
pdf.text("1º: "+ranking[0].fornecedor+" "+ranking[0].telefone+" R$"+ranking[0].valor.toFixed(2),12,y),y+=6;
if(ranking[1])
pdf.text("2º: "+ranking[1].fornecedor+" "+ranking[1].telefone+" R$"+ranking[1].valor.toFixed(2),12,y),y+=6;

y+=4;
if(y>270){pdf.addPage();y=10;}
}

pdf.save("Relatorio_Final.pdf");
}

</script>
</body>
</html>
