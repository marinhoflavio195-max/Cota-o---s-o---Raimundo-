<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos da Cotação</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header id="titulo"></header>

<div class="container" id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

const titulo = document.getElementById("titulo");
const conteudo = document.getElementById("conteudo");

if(!cotacaoId){
  titulo.innerHTML = "Nenhuma cotação criada";
  conteudo.innerHTML = `
    <h2>Nenhuma cotação selecionada.</h2>
    <button onclick="voltar()">Voltar</button>
  `;
} else {

  titulo.innerHTML = "Cotação: " + cotacaoNome;

  conteudo.innerHTML = `
    <h2>Importar Produtos via Excel</h2>
    <input type="file" id="arquivoExcel" accept=".xlsx,.xls">
    <button onclick="importarExcel()">Importar</button>

    <h2>Adicionar Manual</h2>
    <input type="text" id="nomeProduto" placeholder="Nome">
    <input type="number" id="quantidade" placeholder="Quantidade">
    <input type="text" id="unidade" placeholder="Unidade">
    <input type="text" id="observacao" placeholder="Observação">
    <button onclick="adicionarProduto()">Adicionar</button>

    <h2>Lista de Produtos</h2>
    <div id="listaProdutos"></div>

    <br>
    <button onclick="voltar()">Voltar</button>
  `;

  const lista = document.getElementById("listaProdutos");

  onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
    lista.innerHTML="";
    snapshot.forEach((docSnap)=>{
      const data = docSnap.data();

      lista.innerHTML+=`
        <div class="card">
          <b>${data.nome}</b><br>
          ${data.quantidade} ${data.unidade}<br>
          ${data.observacao || ""}
          <br><br>
          <button onclick="excluir('${docSnap.id}')">Excluir</button>
        </div>
      `;
    });
  });

  window.adicionarProduto = async function(){
    const nome = document.getElementById("nomeProduto").value;
    const quantidade = document.getElementById("quantidade").value;
    const unidade = document.getElementById("unidade").value;
    const observacao = document.getElementById("observacao").value;

    if(!nome || !quantidade){
      alert("Preencha nome e quantidade!");
      return;
    }

    await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
      nome,
      quantidade,
      unidade,
      observacao
    });

    document.getElementById("nomeProduto").value="";
    document.getElementById("quantidade").value="";
    document.getElementById("unidade").value="";
    document.getElementById("observacao").value="";
  }

  window.importarExcel = function(){
    const file = document.getElementById("arquivoExcel").files[0];

    if(!file){
      alert("Selecione um arquivo!");
      return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);

      for(let item of json){
        await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
          nome: item.nome,
          quantidade: item.quantidade,
          unidade: item.unidade,
          observacao: item.observacao || ""
        });
      }

      alert("Importação concluída!");
    };

    reader.readAsArrayBuffer(file);
  }

  window.excluir = async function(id){
    await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
  }
}

window.voltar = function(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
