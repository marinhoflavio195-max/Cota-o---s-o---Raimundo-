<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos da Cotação</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header id="titulo"></header>

<div class="container" id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeJtoTDcNmA8aMLtRrHR-CoZUQkbe5TYk",
  authDomain: "cot-online-sao-raimundo-sup.firebaseapp.com",
  projectId: "cot-online-sao-raimundo-sup",
  storageBucket: "cot-online-sao-raimundo-sup.firebasestorage.app",
  messagingSenderId: "57432026650",
  appId: "1:57432026650:web:8a47dd3f22b40bd6e02ba3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

const titulo = document.getElementById("titulo");
const conteudo = document.getElementById("conteudo");

if(!cotacaoId){
  titulo.innerHTML = "Nenhuma cotação criada";
  conteudo.innerHTML = `
    <h2>Nenhuma cotação selecionada.</h2>
    <button onclick="voltar()">Voltar</button>
  `;
} else {

  titulo.innerHTML = "Cotação: " + cotacaoNome;

  conteudo.innerHTML = `
    <h2>Adicionar Produto</h2>
    <input type="text" id="nomeProduto" placeholder="Nome do produto">
    <input type="number" id="quantidade" placeholder="Quantidade">
    <select id="unidade">
      <option value="UN">UN</option>
      <option value="KG">KG</option>
      <option value="CX">CX</option>
      <option value="FD">FD</option>
    </select>
    <input type="text" id="observacao" placeholder="Observação (opcional)">
    <br>
    <button onclick="adicionarProduto()">Adicionar</button>
    <button onclick="exportarExcel()">Exportar Excel</button>

    <h2>Lista de Produtos</h2>
    <div id="listaProdutos"></div>

    <br>
    <button onclick="voltar()">Voltar</button>
  `;

  let produtos = [];

  const lista = document.getElementById("listaProdutos");

  onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
    lista.innerHTML="";
    produtos = [];

    snapshot.forEach((docSnap)=>{
      const data = docSnap.data();
      produtos.push(data);

      lista.innerHTML+=`
        <div class="card">
          <b>${data.nome}</b><br>
          Quantidade: ${data.quantidade} ${data.unidade}<br>
          ${data.observacao ? "Obs: "+data.observacao+"<br>" : ""}
          <br>
          <button onclick="excluir('${docSnap.id}')">Excluir</button>
        </div>
      `;
    });
  });

  window.adicionarProduto = async function(){

    const nome = document.getElementById("nomeProduto").value;
    const quantidade = document.getElementById("quantidade").value;
    const unidade = document.getElementById("unidade").value;
    const observacao = document.getElementById("observacao").value;

    if(!nome || !quantidade){
      alert("Preencha nome e quantidade!");
      return;
    }

    try{
      await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
        nome,
        quantidade,
        unidade,
        observacao
      });

      document.getElementById("nomeProduto").value="";
      document.getElementById("quantidade").value="";
      document.getElementById("observacao").value="";

    }catch(e){
      alert("Erro ao salvar: "+e.message);
    }
  }

  window.excluir = async function(id){
    await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
  }

  window.exportarExcel = function(){

    if(produtos.length === 0){
      alert("Nenhum produto para exportar!");
      return;
    }

    const dados = produtos.map(p => ({
      Produto: p.nome,
      Quantidade: p.quantidade,
      Unidade: p.unidade,
      Observacao: p.observacao || ""
    }));

    const worksheet = XLSX.utils.json_to_sheet(dados);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Cotacao");

    XLSX.writeFile(workbook, "cotacao_"+cotacaoNome+".xlsx");
  }
}

window.voltar = function(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
