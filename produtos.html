<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - São Raimundo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input, select, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:400px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Produtos da Cotação
</header>

<div class="container">

<h2 id="titulo"></h2>

<input type="text" id="nomeProduto" placeholder="Nome do produto">
<br>

<select id="unidade">
  <option value="kg">Kg</option>
  <option value="pacote">Pacote</option>
  <option value="caixa">Caixa</option>
  <option value="unidade">Unidade</option>
</select>
<br>

<input type="number" id="quantidade" placeholder="Quantidade">
<br>

<input type="text" id="observacao" placeholder="Observação (opcional)">
<br>

<button onclick="adicionarProduto()">Adicionar Produto</button>
<button onclick="importarExcel()">Importar Excel</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>

<br>
<button onclick="voltar()">Voltar ao Admin</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

document.getElementById("titulo").innerText = "Cotação: " + cotacaoNome;

const lista = document.getElementById("listaProdutos");

window.adicionarProduto = async function(){
  const nome = document.getElementById("nomeProduto").value;
  const unidade = document.getElementById("unidade").value;
  const quantidade = document.getElementById("quantidade").value;
  const observacao = document.getElementById("observacao").value;

  if(!nome || !quantidade) return alert("Digite nome e quantidade");

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
    nome, unidade, quantidade, observacao
  });

  document.getElementById("nomeProduto").value="";
  document.getElementById("quantidade").value="";
  document.getElementById("observacao").value="";
}

// OBS: Atualização para exibir produtos em tempo real
onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        Qtd: ${data.quantidade} ${data.unidade}<br>
        Obs: ${data.observacao || "-"}<br><br>
        <button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.excluirProduto = async function(id){
  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

window.voltar = function(){
  window.location.href="admin.html";
}

// ======================
// IMPORTAR EXCEL
// ======================
window.importarExcel = function(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".xlsx, .xls";
  input.onchange = async e => {
    const file = e.target.files[0];
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data);
    const sheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(worksheet);

    for(const linha of json){
      const nome = linha.nome;
      const quantidade = linha.quantidade;
      let unidade = linha.unidade.trim().toLowerCase();
      const observacao = linha.observacao || "";

      // Se unidade não existir no select, adiciona
      const select = document.getElementById("unidade");
      if(!Array.from(select.options).some(opt=>opt.value===unidade)){
        const option = document.createElement("option");
        option.value = unidade;
        option.text = unidade.toUpperCase();
        select.add(option);
      }

      // Adiciona produto no Firestore
      if(nome && quantidade){
        await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
          nome,
          quantidade,
          unidade,
          observacao
        });
      }
    }
    alert("Produtos importados com sucesso!");
  };
  input.click();
}

// ======================
// EXPORTAR EXCEL
// ======================
window.exportarExcel = async function(){
  const snapshot = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));
  const produtos = snapshot.docs.map(doc => doc.data());
  if(produtos.length===0) return alert("Nenhum produto para exportar");

  const worksheet = XLSX.utils.json_to_sheet(produtos);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Produtos");
  XLSX.writeFile(workbook, `cotacao-${cotacaoNome}.xlsx`);
}
</script>

</body>
</html>
