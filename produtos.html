<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - PRODUTOS
</header>

<div class="container">

<h2 id="tituloCotacao"></h2>

<h3>Adicionar Produto</h3>
<input type="text" id="nomeProduto" placeholder="Nome do produto">
<button onclick="adicionarProduto()">Adicionar</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>

<br>
<button onclick="voltar()">Voltar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

if (!cotacaoId || !cotacaoNome) {
  alert("Nenhuma cotação selecionada!");
  window.location.href = "admin.html";
}

document.getElementById("tituloCotacao").innerText = "Cotação: " + cotacaoNome;

window.adicionarProduto = async function(){
  const nome = document.getElementById("nomeProduto").value;

  if(!nome) return alert("Digite o nome do produto");

  try{
    await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
      nome: nome,
      criadoEm: new Date()
    });

    document.getElementById("nomeProduto").value = "";
  }catch(e){
    alert("Erro: " + e.message);
  }
}

const lista = document.getElementById("listaProdutos");

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();

    lista.innerHTML+=`
      <div class="card">
        ${data.nome}<br><br>
        <button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.excluirProduto = async function(id){
  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

window.voltar = function(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
