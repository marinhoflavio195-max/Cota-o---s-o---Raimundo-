<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - São Raimundo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input, select, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}

#aviso{
  background:#fff;
  color:#000;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Produtos
</header>

<div class="container">

<h2 id="titulo"></h2>
<div id="aviso" style="display:none;"></div>

<input type="text" id="nomeProduto" placeholder="Nome do produto"><br>
<input type="number" id="quantidadeProduto" placeholder="Quantidade"><br>
<input type="text" id="unidadeProduto" placeholder="Unidade (Ex: kg, pacote, und)"><br>
<input type="text" id="observacaoProduto" placeholder="Observação"><br>
<button onclick="adicionarProduto()">Adicionar Produto</button>
<br><br>
<input type="file" id="arquivoExcel">
<button onclick="importarExcel()">Importar Excel</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>

<br>
<button onclick="voltar()">Voltar ao Admin</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");
const titulo = document.getElementById("titulo");
const aviso = document.getElementById("aviso");

if(!cotacaoId){
  titulo.style.display = "none";
  aviso.style.display = "block";
  aviso.innerText = "❌ Nenhuma cotação selecionada!";
} else {
  titulo.innerText = "Cotação: " + cotacaoNome;

  // Verificar horário da cotação
  getDoc(doc(db,"cotacoes",cotacaoId)).then(docSnap=>{
    if(docSnap.exists()){
      const data = docSnap.data();
      const agora = new Date();
      const inicio = data.inicio.toDate ? data.inicio.toDate() : new Date(data.inicio.seconds*1000);
      const fim = data.fim.toDate ? data.fim.toDate() : new Date(data.fim.seconds*1000);

      if(agora < inicio){
        aviso.style.display = "block";
        aviso.innerText = "⏳ Cotação ainda não começou!";
      } else if(agora > fim){
        aviso.style.display = "block";
        aviso.innerText = "⛔ Cotação encerrada!";
      }
    }
  });
}

// ----------------- Lista de produtos -----------------
const lista = document.getElementById("listaProdutos");

window.adicionarProduto = async function(){
  if(!cotacaoId) return;
  const nome = document.getElementById("nomeProduto").value;
  const quantidade = document.getElementById("quantidadeProduto").value;
  const unidade = document.getElementById("unidadeProduto").value;
  const obs = document.getElementById("observacaoProduto").value;

  if(!nome) return alert("Digite o nome do produto");

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
    nome:nome,
    quantidade:quantidade,
    unidade:unidade,
    observacao:obs
  });

  document.getElementById("nomeProduto").value="";
  document.getElementById("quantidadeProduto").value="";
  document.getElementById("unidadeProduto").value="";
  document.getElementById("observacaoProduto").value="";
}

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        Qtd: ${data.quantidade} ${data.unidade}<br>
        Obs: ${data.observacao}<br><br>
        <button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.excluirProduto = async function(id){
  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

// ----------------- Importar Excel -----------------
window.importarExcel = function(){
  const arquivo = document.getElementById("arquivoExcel").files[0];
  if(!arquivo) return alert("Selecione um arquivo Excel");

  const reader = new FileReader();
  reader.onload = e=>{
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:'array'});
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(sheet);

    json.forEach(async item=>{
      if(item.nome) await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
        nome:item.nome || "",
        quantidade:item.quantidade || "",
        unidade:item.unidade || "",
        observacao:item.observacao || ""
      });
    });
  }
  reader.readAsArrayBuffer(arquivo);
}

// ----------------- Exportar Excel -----------------
window.exportarExcel = function(){
  alert("Função de exportar vai trazer a cotação finalizada com todos os preços, menor preço e fornecedor");
}

// ----------------- Voltar -----------------
window.voltar = function(){
  window.location.href="admin.html";
}
</script>

</body>
</html>
