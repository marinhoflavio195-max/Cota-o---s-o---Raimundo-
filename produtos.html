<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}
.container{ padding:20px; }

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}
button:hover{ background:#cc0000; }

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px auto;
  border-radius:10px;
  max-width:400px;
}

#statusMsg{
  font-weight:bold;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>
Gerenciar Produtos
</header>

<div class="container">

<h3 id="nomeCotacao"></h3>
<div id="statusMsg"></div>

<input type="text" id="nomeProduto" placeholder="Nome do produto"><br>
<input type="number" id="quantidade" placeholder="Quantidade"><br>
<input type="text" id="unidade" placeholder="Unidade (kg, cx, und...)"><br>

<button onclick="adicionarProduto()">Adicionar Produto</button>

<hr>

<div id="listaProdutos"></div>

<br>
<button onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

if(!cotacaoId){
  alert("Nenhuma cotação selecionada");
  window.location.href="admin.html";
}

document.getElementById("nomeCotacao").innerText = cotacaoNome;

const statusMsg = document.getElementById("statusMsg");
let edicaoLiberada = true;

// ================= VERIFICAR STATUS =================

async function verificarStatus(){

  const cotacaoSnap = await getDoc(doc(db,"cotacoes",cotacaoId));

  if(!cotacaoSnap.exists()){
    statusMsg.innerText = "Cotação não encontrada";
    edicaoLiberada = false;
    return;
  }

  const dados = cotacaoSnap.data();
  const agora = new Date();
  const fim = dados.fim.toDate();
  const status = dados.status || "ativa";

  if(status === "encerrada"){
    statusMsg.innerText = "⛔ Cotação encerrada";
    edicaoLiberada = false;
    return;
  }

  if(status === "desativada"){
    statusMsg.innerText = "⚠️ Cotação desativada";
    edicaoLiberada = false;
    return;
  }

  if(agora > fim){
    statusMsg.innerText = "⛔ Tempo da cotação finalizado";
    edicaoLiberada = false;
    return;
  }

  statusMsg.innerText = "✅ Cotação ativa";
  edicaoLiberada = true;
}

verificarStatus();

// ================= LISTAR PRODUTOS =================

const lista = document.getElementById("listaProdutos");

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
  lista.innerHTML="";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        ${data.nome} - ${data.quantidade} ${data.unidade}
        <br>
        <button onclick="excluir('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

// ================= ADICIONAR =================

window.adicionarProduto = async function(){

  if(!edicaoLiberada){
    alert("Edição bloqueada.");
    return;
  }

  const nome = nomeProduto.value;
  const quantidade = quantidade.value;
  const unidade = unidade.value;

  if(!nome || !quantidade || !unidade){
    alert("Preencha tudo");
    return;
  }

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
    nome,
    quantidade,
    unidade
  });

  nomeProduto.value="";
  quantidade.value="";
  unidade.value="";
}

// ================= EXCLUIR =================

window.excluir = async function(id){

  if(!edicaoLiberada){
    alert("Edição bloqueada.");
    return;
  }

  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

// ================= VOLTAR =================

window.voltar = function(){
  window.location.href="admin.html";
}

</script>
</body>
</html>
