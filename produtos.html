<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Produtos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
Gerenciar Produtos - São Raimundo
</header>

<div class="container">

<div id="conteudo"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY_AQUI",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE",
  messagingSenderId: "SEU_SENDER",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

const conteudo = document.getElementById("conteudo");

if(!cotacaoId){
  conteudo.innerHTML = "<h2>Nenhuma cotação criada</h2>";
}else{

conteudo.innerHTML = `
<h2>${cotacaoNome}</h2>

<h3>Importar Produtos via Excel</h3>
<input type="file" id="arquivoExcel">
<button onclick="importarExcel()">Importar</button>

<hr>

<h3>Adicionar Produto Manual</h3>
<input type="text" id="nomeProduto" placeholder="Nome do produto">
<select id="unidade">
  <option value="">Selecione</option>
  <option value="UN">UN</option>
  <option value="KG">KG</option>
  <option value="G">G</option>
  <option value="CX">CX</option>
  <option value="FD">FD</option>
  <option value="PCT">PCT</option>
  <option value="L">L</option>
  <option value="ML">ML</option>
</select>
<input type="number" id="quantidade" placeholder="Quantidade">
<br>
<button onclick="adicionarProduto()">Adicionar</button>

<hr>

<button onclick="exportarExcel()">Exportar para Excel</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>
`;

const lista = document.getElementById("listaProdutos");

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        ${data.quantidade} ${data.unidade}<br><br>
        <button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.adicionarProduto = async function(){
  const nome = document.getElementById("nomeProduto").value;
  const unidade = document.getElementById("unidade").value;
  const quantidade = document.getElementById("quantidade").value;

  if(!nome || !unidade || !quantidade){
    alert("Preencha todos os campos");
    return;
  }

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
    nome: nome,
    unidade: unidade,
    quantidade: quantidade
  });

  document.getElementById("nomeProduto").value="";
  document.getElementById("unidade").value="";
  document.getElementById("quantidade").value="";
}

window.excluirProduto = async function(id){
  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

window.importarExcel = function(){
  const arquivo = document.getElementById("arquivoExcel").files[0];
  if(!arquivo){
    alert("Selecione o arquivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    for(const item of json){
      await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
        nome: item.nome,
        unidade: item.unidade,
        quantidade: item.quantidade
      });
    }

    alert("Importado com sucesso!");
  };

  reader.readAsArrayBuffer(arquivo);
}

window.exportarExcel = async function(){

  const snapshot = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));

  let dados = [];

  snapshot.forEach(docSnap=>{
    dados.push(docSnap.data());
  });

  if(dados.length === 0){
    alert("Nenhum produto para exportar!");
    return;
  }

  const worksheet = XLSX.utils.json_to_sheet(dados);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Produtos");

  XLSX.writeFile(workbook, "produtos_cotacao.xlsx");
}

}

</script>

</body>
</html>
