<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - São Raimundo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input, select, button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}

.resultado{
  background:#fff;
  color:#000;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Produtos da Cotação
</header>

<div class="container">

<h2 id="titulo"></h2>

<!-- Adicionar produto manual -->
<input type="text" id="nomeProduto" placeholder="Nome do produto">
<input type="text" id="unidadeProduto" placeholder="Unidade">
<input type="text" id="observacaoProduto" placeholder="Observação">
<br>
<button onclick="adicionarProduto()">Adicionar Produto</button>

<!-- Importar Excel -->
<h3>Importar produtos via Excel</h3>
<input type="file" id="excelFile" accept=".xlsx, .xls">
<button onclick="importarExcel()">Importar</button>

<!-- Exportar Excel -->
<h3>Exportar cotação</h3>
<button onclick="exportarExcel()">Exportar Cotação Final</button>

<h3>Lista de Produtos</h3>
<div id="listaProdutos"></div>

<div id="mensagemTempo" class="resultado"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  deleteDoc, 
  doc, 
  onSnapshot,
  getDocs,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

document.getElementById("titulo").innerText = "Cotação: " + cotacaoNome;

const lista = document.getElementById("listaProdutos");
const mensagemTempo = document.getElementById("mensagemTempo");

// ------------------- Buscar tempo da cotação -------------------
let inicioCotacao = null;
let fimCotacao = null;

async function buscarTempoCotacao(){
  const cotRef = doc(db,"cotacoes",cotacaoId);
  const cotSnap = await getDoc(cotRef);
  if(cotSnap.exists()){
    const data = cotSnap.data();
    inicioCotacao = data.inicio ? new Date(data.inicio.seconds*1000) : null;
    fimCotacao = data.fim ? new Date(data.fim.seconds*1000) : null;
  }
}

// ------------------- Adicionar Produto Manual -------------------
window.adicionarProduto = async function(){
  const now = new Date();
  await buscarTempoCotacao();
  if(inicioCotacao && now < inicioCotacao){
    return alert("Cotação ainda não começou!");
  }
  if(fimCotacao && now > fimCotacao){
    return alert("Cotação encerrada!");
  }

  const nome = document.getElementById("nomeProduto").value;
  const unidade = document.getElementById("unidadeProduto").value;
  const observacao = document.getElementById("observacaoProduto").value;

  if(!nome) return alert("Digite o nome do produto");

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
    nome: nome,
    unidade: unidade,
    observacao: observacao
  });

  document.getElementById("nomeProduto").value="";
  document.getElementById("unidadeProduto").value="";
  document.getElementById("observacaoProduto").value="";
}

// ------------------- Listar Produtos -------------------
onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), (snapshot)=>{
  lista.innerHTML="";
  snapshot.forEach((docSnap)=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        Unidade: ${data.unidade}<br>
        Observação: ${data.observacao || "-"}<br><br>
        <button onclick="excluirProduto('${docSnap.id}')">Excluir</button>
      </div>
    `;
  });
});

window.excluirProduto = async function(id){
  await deleteDoc(doc(db,"cotacoes",cotacaoId,"produtos",id));
}

// ------------------- Importar Excel -------------------
window.importarExcel = function(){
  const fileInput = document.getElementById("excelFile");
  const file = fileInput.files[0];
  if(!file) return alert("Selecione um arquivo Excel");

  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type:"array"});
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(sheet);

    for(const item of json){
      await addDoc(collection(db,"cotacoes",cotacaoId,"produtos"),{
        nome: item.nome,
        unidade: item.unidade,
        observacao: item.observacao
      });
    }
    alert("Importação concluída!");
  };
  reader.readAsArrayBuffer(file);
}

// ------------------- Exportar Excel Consolidado -------------------
window.exportarExcel = async function(){
  const produtosSnapshot = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));
  const produtos = [];
  produtosSnapshot.forEach(docSnap=>{
    produtos.push({...docSnap.data(), id: docSnap.id});
  });

  // Buscar respostas de fornecedores
  const respostasSnapshot = await getDocs(collection(db,"respostas"));
  let menores = {};
  respostasSnapshot.forEach(docSnap=>{
    const data = docSnap.data();
    if(data.cotacaoId === cotacaoId){
      data.produtos.forEach(p=>{
        let preco = parseFloat(p.valor);
        if(!menores[p.nome] || preco < menores[p.nome].preco){
          menores[p.nome] = {
            fornecedor: data.fornecedor,
            preco: preco
          };
        }
      });
    }
  });

  // Criar XLSX
  const ws_data = [["Produto","Unidade","Observação","Menor Preço","Fornecedor"]];
  produtos.forEach(p=>{
    const menor = menores[p.nome] || {preco:"-", fornecedor:"-"};
    ws_data.push([p.nome,p.unidade,p.observacao || "-", menor.preco, menor.fornecedor]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  XLSX.utils.book_append_sheet(wb, ws, "Cotação Final");
  XLSX.writeFile(wb, `cotacao_${cotacaoNome}.xlsx`);
}

</script>

</body>
</html>
