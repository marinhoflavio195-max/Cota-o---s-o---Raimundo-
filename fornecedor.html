<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  doc, 
  getDoc, 
  onSnapshot, 
  addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 PEGAR ID DA URL */
const urlParams = new URLSearchParams(window.location.search);
const cotacaoId = urlParams.get("id");

const titulo = document.getElementById("titulo");
const aviso = document.getElementById("aviso");
const lista = document.getElementById("listaProdutos");

if(!cotacaoId){
  aviso.style.display="block";
  aviso.innerText="❌ Link inválido.";
} else {

  const cotacaoRef = doc(db,"cotacoes",cotacaoId);

  getDoc(cotacaoRef).then(docSnap=>{

    if(!docSnap.exists()){
      aviso.style.display="block";
      aviso.innerText="❌ Cotação não encontrada.";
      return;
    }

    const data = docSnap.data();
    titulo.innerText="Cotação: " + data.nome;

    const agora = new Date();
    const inicio = data.inicio.toDate();
    const fim = data.fim.toDate();

    if(agora < inicio){
      aviso.style.display="block";
      aviso.innerText="⏳ Cotação ainda não começou.";
      return;
    }

    if(agora > fim){
      aviso.style.display="block";
      aviso.innerText="⛔ Cotação encerrada.";
      return;
    }

    /* LISTAR PRODUTOS */
    onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
      lista.innerHTML="";

      snapshot.forEach(prodDoc=>{
        const p = prodDoc.data();

        lista.innerHTML+=`
          <div class="card">
            <b>${p.nome}</b><br>
            Qtd: ${p.quantidade} ${p.unidade}<br>
            <input type="number" placeholder="Seu preço" id="preco-${prodDoc.id}">
            <br>
            <button onclick="enviarPreco('${prodDoc.id}')">
              Enviar Preço
            </button>
          </div>
        `;
      });

    });

  });
}

window.enviarPreco = async function(produtoId){
  const preco = document.getElementById("preco-"+produtoId).value;
  const fornecedor = prompt("Digite o nome da sua empresa:");

  if(!preco || !fornecedor){
    alert("Preencha todos os dados.");
    return;
  }

  await addDoc(
    collection(db,"cotacoes",cotacaoId,"produtos",produtoId,"precos"),
    {
      preco: parseFloat(preco),
      fornecedor,
      data:new Date()
    }
  );

  alert("✅ Preço enviado com sucesso!");
}
</script>
