<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedor - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}
.container{ padding:20px; }

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}
button:hover{ background:#cc0000; }

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px auto;
  border-radius:10px;
  max-width:400px;
}

#cronometro{
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
}

#statusMsg{
  font-weight:bold;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Fornecedor
</header>

<div class="container">

<h3 id="nomeCotacao"></h3>

<div id="cronometro"></div>
<div id="statusMsg"></div>

<input type="text" id="nomeFornecedor" placeholder="Seu nome ou empresa"><br>

<div id="listaProdutos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const cotacaoId = params.get("id");

if(!cotacaoId){
  document.body.innerHTML="<h2>Link inválido</h2>";
}

const cotacaoRef = doc(db,"cotacoes",cotacaoId);
const cotacaoSnap = await getDoc(cotacaoRef);

if(!cotacaoSnap.exists()){
  document.body.innerHTML="<h2>Cotação não encontrada</h2>";
}

const dadosCotacao = cotacaoSnap.data();

document.getElementById("nomeCotacao").innerText = dadosCotacao.nome;

const statusMsg = document.getElementById("statusMsg");
const cronometro = document.getElementById("cronometro");

let envioLiberado = true;

// ================= STATUS =================

function verificarStatus(){

  const agora = new Date();
  const inicio = dadosCotacao.inicio.toDate();
  const fim = dadosCotacao.fim.toDate();
  const status = dadosCotacao.status || "ativa";

  if(status === "encerrada"){
    statusMsg.innerText = "⛔ Cotação encerrada pelo administrador";
    envioLiberado = false;
    return;
  }

  if(status === "desativada"){
    statusMsg.innerText = "⚠️ Cotação temporariamente desativada";
    envioLiberado = false;
    return;
  }

  if(agora < inicio){
    statusMsg.innerText = "⏳ Cotação ainda não iniciou";
    envioLiberado = false;
    return;
  }

  if(agora > fim){
    statusMsg.innerText = "⛔ Cotação finalizada por tempo";
    envioLiberado = false;
    return;
  }

  statusMsg.innerText = "✅ Cotação ativa";
  envioLiberado = true;
}

verificarStatus();

// ================= CRONÔMETRO =================

function iniciarCronometro(){

  const fim = dadosCotacao.fim.toDate();

  setInterval(()=>{
    const agora = new Date();
    const diff = fim - agora;

    if(diff <= 0){
      cronometro.innerText = "Tempo encerrado";
      envioLiberado = false;
      return;
    }

    const horas = Math.floor(diff / (1000*60*60));
    const minutos = Math.floor((diff % (1000*60*60)) / (1000*60));
    const segundos = Math.floor((diff % (1000*60)) / 1000);

    cronometro.innerText = 
      "Tempo restante: " +
      horas + "h " +
      minutos + "m " +
      segundos + "s";
  },1000);
}

iniciarCronometro();

// ================= PRODUTOS =================

const lista = document.getElementById("listaProdutos");

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
  lista.innerHTML="";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        ${data.quantidade} ${data.unidade}<br><br>
        <input type="number" id="preco_${docSnap.id}" placeholder="Seu preço"><br>
        <button onclick="enviar('${docSnap.id}')">Enviar Preço</button>
      </div>
    `;
  });
});

// ================= ENVIAR =================

window.enviar = async function(produtoId){

  if(!envioLiberado){
    alert("Envio bloqueado.");
    return;
  }

  const fornecedor = nomeFornecedor.value;
  const preco = document.getElementById("preco_"+produtoId).value;

  if(!fornecedor || !preco){
    alert("Preencha seu nome e o preço");
    return;
  }

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos",produtoId,"precos"),{
    fornecedor,
    preco,
    data:new Date()
  });

  alert("Preço enviado!");
}

</script>
</body>
</html>
