<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedor - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}
.container{ padding:20px; }
.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
input{
  padding:8px;
  margin-top:5px;
}
button{
  padding:8px;
  margin-top:5px;
  background:#ff0000;
  color:white;
  border:none;
  border-radius:6px;
}
#aviso{
  background:#fff;
  color:#000;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Fornecedor
</header>

<div class="container">
<h2 id="titulo"></h2>
<div id="aviso" style="display:none;"></div>
<div id="listaProdutos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

const titulo = document.getElementById("titulo");
const aviso = document.getElementById("aviso");
const lista = document.getElementById("listaProdutos");

if(!cotacaoId){
  aviso.style.display="block";
  aviso.innerText="Nenhuma cotação informada.";
} else {

  titulo.innerText="Cotação: "+cotacaoNome;

  const cotacaoRef = doc(db,"cotacoes",cotacaoId);

  getDoc(cotacaoRef).then(docSnap=>{
    if(!docSnap.exists()){
      aviso.style.display="block";
      aviso.innerText="Cotação não encontrada.";
      return;
    }

    const data = docSnap.data();
    const agora = new Date();
    const inicio = data.inicio.toDate();
    const fim = data.fim.toDate();

    if(agora < inicio){
      aviso.style.display="block";
      aviso.innerText="⏳ Cotação ainda não começou.";
      return;
    }

    if(agora > fim){
      aviso.style.display="block";
      aviso.innerText="⛔ Cotação encerrada.";
      return;
    }

    // LISTAR PRODUTOS
    onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
      lista.innerHTML="";
      snapshot.forEach(prodDoc=>{
        const p = prodDoc.data();
        lista.innerHTML+=`
          <div class="card">
            <b>${p.nome}</b><br>
            Qtd: ${p.quantidade} ${p.unidade}<br>
            <input type="number" placeholder="Seu preço" id="preco-${prodDoc.id}">
            <br>
            <button onclick="enviarPreco('${prodDoc.id}')">Enviar Preço</button>
          </div>
        `;
      });
    });

  });
}

window.enviarPreco = async function(produtoId){
  const preco = document.getElementById("preco-"+produtoId).value;
  const fornecedor = prompt("Digite o nome da sua empresa:");

  if(!preco || !fornecedor) return alert("Preencha os dados");

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos",produtoId,"precos"),{
    preco,
    fornecedor,
    data:new Date()
  });

  alert("Preço enviado com sucesso!");
}
</script>

</body>
</html>
