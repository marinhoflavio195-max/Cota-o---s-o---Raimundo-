<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedor - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#8B0000;
  color:white;
  text-align:center;
}
header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}
.container{ padding:20px; }

input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}
button:hover{ background:#cc0000; }

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px auto;
  border-radius:10px;
  max-width:400px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Fornecedor
</header>

<div class="container">

<h3 id="nomeCotacao"></h3>

<input type="text" id="nomeFornecedor" placeholder="Seu nome ou empresa"><br>

<div id="listaProdutos"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const cotacaoId = params.get("id");

if(!cotacaoId){
  document.body.innerHTML="<h2>Link inválido</h2>";
}

const cotacaoRef = doc(db,"cotacoes",cotacaoId);
const cotacaoSnap = await getDoc(cotacaoRef);

document.getElementById("nomeCotacao").innerText = cotacaoSnap.data().nome;

const lista = document.getElementById("listaProdutos");

onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
  lista.innerHTML="";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        ${data.quantidade} ${data.unidade}<br><br>
        <input type="number" id="preco_${docSnap.id}" placeholder="Seu preço"><br>
        <button onclick="enviar('${docSnap.id}')">Enviar Preço</button>
      </div>
    `;
  });
});

window.enviar = async function(produtoId){
  const fornecedor = nomeFornecedor.value;
  const preco = document.getElementById("preco_"+produtoId).value;

  if(!fornecedor || !preco) return alert("Preencha seu nome e o preço");

  await addDoc(collection(db,"cotacoes",cotacaoId,"produtos",produtoId,"precos"),{
    fornecedor,
    preco
  });

  alert("Preço enviado!");
}

</script>
</body>
</html>
