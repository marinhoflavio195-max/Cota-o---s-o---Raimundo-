<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedor - Cotação</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

input,button{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button{
  background:#ff0000;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px auto;
  border-radius:8px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - FORNECEDOR
</header>

<div class="container">

<div id="identificacao">
  <h3>Identificação do Fornecedor</h3>
  <input type="text" id="nomeFornecedor" placeholder="Nome da Empresa">
  <br>
  <button onclick="iniciar()">Iniciar Cotação</button>
</div>

<div id="cotacaoArea" style="display:none;">
  <h3>Preencha os preços</h3>
  <div id="listaProdutos"></div>
  <button onclick="enviar()">Enviar Cotação</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const cotacaoId = urlParams.get("id");

if(!cotacaoId){
  document.body.innerHTML="<h2>Nenhuma cotação informada.</h2>";
}

let produtos = [];

window.iniciar = async function(){

  const nomeFornecedor = document.getElementById("nomeFornecedor").value;
  if(!nomeFornecedor) return alert("Digite o nome da empresa");

  localStorage.setItem("fornecedorNome",nomeFornecedor);

  document.getElementById("identificacao").style.display="none";
  document.getElementById("cotacaoArea").style.display="block";

  const snapshot = await getDocs(collection(db,"cotacoes",cotacaoId,"produtos"));
  const lista = document.getElementById("listaProdutos");

  lista.innerHTML="";
  produtos = [];

  snapshot.forEach((doc)=>{
    const data = doc.data();
    produtos.push({id:doc.id,...data});

    lista.innerHTML+=`
      <div class="card">
        <b>${data.nome}</b><br>
        Quantidade: ${data.quantidade} ${data.unidade}<br><br>
        <input type="number" step="0.01" placeholder="Preço unitário" id="preco_${doc.id}">
      </div>
    `;
  });

}

window.enviar = async function(){

  const nomeFornecedor = localStorage.getItem("fornecedorNome");

  const itens = [];

  produtos.forEach(prod=>{
    const preco = document.getElementById("preco_"+prod.id).value;
    if(preco){
      itens.push({
        nome: prod.nome,
        quantidade: prod.quantidade,
        unidade: prod.unidade,
        preco: parseFloat(preco)
      });
    }
  });

  if(itens.length === 0){
    return alert("Informe pelo menos um preço");
  }

  await addDoc(collection(db,"cotacoes",cotacaoId,"respostas"),{
    fornecedor: nomeFornecedor,
    dataEnvio: new Date(),
    itens: itens
  });

  alert("Cotação enviada com sucesso!");
  location.reload();
}

</script>

</body>
</html>
