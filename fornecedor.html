<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fornecedor - São Raimundo</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#8B0000;
  color:white;
  text-align:center;
}

header{
  background:#B22222;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}

#aviso{
  background:#fff;
  color:#000;
  padding:15px;
  margin:10px auto;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<header>
São Raimundo Supermercado - Fornecedor
</header>

<div class="container">
<h2 id="titulo"></h2>
<div id="aviso" style="display:none;"></div>
<div id="listaProdutos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6a_KyBljuDADZYybCKyg2noMhq7i4WPw",
  authDomain: "cotacao-sao-raimundo-oficial.firebaseapp.com",
  projectId: "cotacao-sao-raimundo-oficial",
  storageBucket: "cotacao-sao-raimundo-oficial.firebasestorage.app",
  messagingSenderId: "999255626219",
  appId: "1:999255626219:web:653adf6dedde30237fc9ae"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cotacaoId = localStorage.getItem("cotacaoId");
const cotacaoNome = localStorage.getItem("cotacaoNome");

const titulo = document.getElementById("titulo");
const aviso = document.getElementById("aviso");
const lista = document.getElementById("listaProdutos");

if(!cotacaoId){
  titulo.style.display = "none";
  aviso.style.display = "block";
  aviso.innerText = "❌ Nenhuma cotação informada!";
} else {
  titulo.innerText = "Cotação: " + cotacaoNome;

  // Verifica se a cotação está ativa e dentro do período
  getDoc(doc(db,"cotacoes",cotacaoId)).then(docSnap=>{
    if(docSnap.exists()){
      const data = docSnap.data();
      const agora = new Date();
      const inicio = data.inicio ? data.inicio.toDate ? data.inicio.toDate() : new Date(data.inicio.seconds*1000) : null;
      const fim = data.fim ? data.fim.toDate ? data.fim.toDate() : new Date(data.fim.seconds*1000) : null;

      if(!data.ativa){
        aviso.style.display = "block";
        aviso.innerText = "⛔ Cotação inativa!";
      } else if(inicio && agora < inicio){
        aviso.style.display = "block";
        aviso.innerText = "⏳ Cotação ainda não começou!";
      } else if(fim && agora > fim){
        aviso.style.display = "block";
        aviso.innerText = "⛔ Cotação encerrada!";
      } else {
        // Cotação dentro do período, listar produtos
        onSnapshot(collection(db,"cotacoes",cotacaoId,"produtos"), snapshot=>{
          lista.innerHTML = "";
          if(snapshot.empty){
            aviso.style.display = "block";
            aviso.innerText = "❌ Nenhum produto cadastrado nesta cotação!";
          } else {
            snapshot.forEach(docSnap=>{
              const p = docSnap.data();
              lista.innerHTML += `
                <div class="card">
                  <b>${p.nome}</b><br>
                  Qtd: ${p.quantidade} ${p.unidade}<br>
                  Obs: ${p.observacao || "-"}<br>
                </div>
              `;
            });
          }
        });
      }
    } else {
      aviso.style.display = "block";
      aviso.innerText = "❌ Nenhuma cotação encontrada!";
    }
  });
}
</script>

</body>
</html>
